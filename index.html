<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Briefly - AI Text Summarizer</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 850px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* HEADER */
    .title {
  text-align: center;
  font-size: 40px;
  font-weight: 800;
  letter-spacing: 2px;
  background: linear-gradient(
    90deg,
    #facc15,
    #f472b6,
    #60a5fa,
    #34d399,
    #facc15
  );
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glitter 3s linear infinite;
  position: relative;
}

/* glitter animation */
@keyframes glitter {
  0% {
    background-position: 0% 50%;
  }
  100% {
    background-position: 100% 50%;
  }
}

/* optional glow effect */
.title::after {
  content: "Briefly";
  position: absolute;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
  filter: blur(10px);
  opacity: 0.4;
  background: inherit;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

    .subtitle {
      text-align: center;
      margin-top: 8px;
      font-size: 14px;
      color: #cbd5e1;
    }

    /* INPUT AREA */
    .input-box {
      margin-top: 25px;
    }

    textarea {
      width: 100%;
      height: 180px;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.2);
      color: white;
      outline: none;
      resize: none;
      font-size: 14px;
      transition: 0.3s;
    }

    textarea:focus {
      border: 1px solid #60a5fa;
      box-shadow: 0 0 10px rgba(96,165,250,0.4);
    }

    .counter {
      text-align: right;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 5px;
    }

    /* BUTTON */
    .btn {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 25px rgba(139,92,246,0.3);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* OUTPUT */
    .output {
      margin-top: 25px;
      padding: 15px;
      border-radius: 12px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      min-height: 100px;
    }

    .output h3 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #93c5fd;
    }

    .output p {
      font-size: 14px;
      line-height: 1.6;
      color: #e2e8f0;
      white-space: pre-wrap;
    }

    /* LOADER */
    .loader {
      border: 3px solid rgba(255,255,255,0.2);
      border-top: 3px solid #60a5fa;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 8px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }

    /* COPY BUTTON */
    .copy-btn {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      color: white;
      transition: 0.3s;
    }

    .copy-btn:hover {
      background: rgba(255,255,255,0.2);
    }
      </style>
</head>

<body>
  <div class="container">

    <div class="title">Briefly</div>
    <div class="subtitle">AI-Powered Text Summarizer</div>

    <div class="input-box">
      <textarea id="inputText" placeholder="Paste your text here..."></textarea>
      <div class="counter" id="counter">0 characters</div>

      <button class="btn" id="submitBtn" onclick="summarizeText()">
        Generate Summary
      </button>
    </div>

    <div class="output">
      <h3>AI Generated Summary</h3>
      <p id="outputText">Your summary will appear here...</p>

      <button class="copy-btn" onclick="copySummary()">Copy Summary</button>
    </div>
  </div>

<script>
  const inputText = document.getElementById("inputText");
  const counter = document.getElementById("counter");
  const outputText = document.getElementById("outputText");
  const btn = document.getElementById("submitBtn");

  // Character counter
  inputText.addEventListener("input", () => {
    counter.innerText = `${inputText.value.length} characters`;
  });

  // Summarize function (calls your backend)
  async function summarizeText() {
    const text = inputText.value.trim();

    if (!text) {
      outputText.innerText = "Please enter some text first!";
      return;
    }

    btn.disabled = true;
    btn.innerHTML = `<span class="loader"></span> Generating...`;
    outputText.innerText = "Processing your text...";

    try {
      const response = await fetch("/summarize/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ dialogue: text })
      });

      const data = await response.json();

      outputText.innerText = data.summary || "No summary returned.";

    } catch (error) {
      outputText.innerText = "Error connecting to server.";
    }

    btn.disabled = false;
    btn.innerText = "Generate Summary";
  }

  // Copy summary
  function copySummary() {
    const text = outputText.innerText;

    navigator.clipboard.writeText(text)
      .then(() => {
        alert("Summary copied!");
      })
      .catch(() => {
        alert("Failed to copy!");
      });
  }
</script>
</body>
</html>
